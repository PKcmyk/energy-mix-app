# Render blueprint — provisions both services from this monorepo.
# After connecting the repo in Render, set the frontend's VITE_API_URL to the
# backend's public URL, and the backend's CORS_ALLOWED_ORIGINS to the frontend URL.
services:
  - type: web
    name: energy-mix-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: energy-mix-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: VITE_API_URL
        sync: false
