services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      CORS_ALLOWED_ORIGINS: "http://localhost:8081"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:8080"
    ports:
      - "8081:80"
    environment:
      PORT: 80
    depends_on:
      - backend
