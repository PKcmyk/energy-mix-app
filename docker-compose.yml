services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    environment:
      PORT: 80
      # nginx proxies /api to the backend over the compose network.
      BACKEND_URL: "http://backend:8080"
    depends_on:
      - backend
