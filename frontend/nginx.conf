server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Proxy API calls to the backend so the browser only ever talks to this origin
    # (no CORS, backend URL configured at runtime via the BACKEND_URL env var).
    location /api/ {
        proxy_pass              ${BACKEND_URL};
        proxy_http_version      1.1;
        proxy_set_header        Host $proxy_host;
        proxy_ssl_server_name   on;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # On Render's free tier the backend spins down after ~15 min idle and a
        # cold start takes ~45-75s. Wait it out instead of returning 502.
        proxy_connect_timeout   90s;
        proxy_send_timeout      90s;
        proxy_read_timeout      90s;
    }

    # Single-page app: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
