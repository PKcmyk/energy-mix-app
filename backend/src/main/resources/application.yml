server:
  port: ${PORT:8080}

spring:
  application:
    name: energy-mix-backend
  cache:
    cache-names: generation
    caffeine:
      spec: maximumSize=64,expireAfterWrite=30m

app:
  carbon-intensity:
    base-url: ${CARBON_INTENSITY_BASE_URL:https://api.carbonintensity.org.uk}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
