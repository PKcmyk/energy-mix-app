server:
  port: ${PORT:8080}

spring:
  application:
    name: energy-mix-backend

app:
  carbon-intensity:
    # Public UK Carbon Intensity API; override per environment if needed.
    base-url: ${CARBON_INTENSITY_BASE_URL:https://api.carbonintensity.org.uk}
  cors:
    # Comma-separated list of allowed front-end origins. "*" allows any origin.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
